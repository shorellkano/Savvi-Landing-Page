kind = "web"
previewPath = "/"
title = "Savvi - Nigeria's Student Savings Platform"
version = "1.0.0"
id = "artifacts/savvi-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21885

[services.development]
run = "pnpm --filter @workspace/savvi-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/savvi-website", "run", "build" ]
publicDir = "artifacts/savvi-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21885"
BASE_PATH = "/"
